<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Details - BusinessBangla.com.bd</title>
  
  <link rel="stylesheet" href="../css/variables.css?v=1775204587481">
  <link rel="stylesheet" href="../css/base.css?v=1775204587481">
  <link rel="stylesheet" href="../css/navbar.css?v=1775204587481">
  <link rel="stylesheet" href="../css/modal.css?v=1775204587481">
  <link rel="stylesheet" href="../css/responsive.css?v=1775204587481">
  
  <style>
    .biz-header { background: var(--yp-light); border-bottom: 3px solid var(--yp); padding: 40px 0; margin-bottom: 30px; }
    .biz-header-content { display: flex; gap: 20px; align-items: center; }
    .biz-icon-large { width: 100px; height: 100px; background: #fff; border: 1px solid var(--yp); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; font-size: 50px; overflow: hidden; }
    .biz-icon-large img { width: 100%; height: 100%; object-fit: cover; }
    .biz-title-wrap h1 { font-size: 32px; color: var(--dark); margin-bottom: 10px; }
    
    .badge-vf, .badge-ft, .badge-pr { font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-left:10px; vertical-align: middle; }
    .badge-vf { border: 1px solid var(--green); color: var(--green); }
    .badge-ft { background: var(--yp); color: var(--dark); }
    .badge-pr { background: var(--dark); color: var(--yp); }

    .biz-info-pills { display: flex; gap: 15px; flex-wrap: wrap; color: var(--mid); font-size: 15px; margin-top: 10px; }
    .stars { color: var(--yp2); letter-spacing: 2px; }

    .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
    .desc-box { background: #fff; border: 1px solid var(--border); padding: 24px; border-radius: var(--radius-lg); margin-bottom: 30px; line-height: 1.7; color: var(--mid); white-space: pre-wrap; }
    
    .info-sm-card { background: #fff; border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); margin-bottom: 15px; }
    .info-sm-card h5 { color: var(--muted); font-size: 13px; margin-bottom: 5px; }
    
    .btn-sticky-phone { background: var(--yp); color: var(--dark); padding: 14px; border-radius: var(--radius); font-weight: 600; width: 100%; border: none; cursor: pointer; display: block; text-align: center; text-decoration: none; }
    
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } .biz-header-content { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <a href="../index.html" class="logo-area">
        <div class="logo-box"></div>
        <div class="logo-text">
          <h1>বিজনেসবাংলা</h1>
          <span>BusinessBangla.com.bd</span>
        </div>
      </a>
      <div class="header-nav">
        <a href="../listings/listings.html">ক্যাটাগরি</a>
        <a href="../info/blog.html">ব্লগ</a>
        <a href="../listings/add-listing.html" class="btn-add">বিজ্ঞাপন দিন</a>
      </div>
    </div>
  </header>

  <div id="appContainer">
    <div style="padding: 100px; text-align: center;">বিশদ তথ্য লোড হচ্ছে...</div>
  </div>

  <footer class="footer">
    <div class="container" style="text-align: center; padding: 40px 0; border-top: 1px solid #eee;">
      &copy; 2026 BusinessBangla.com.bd
    </div>
  </footer>

  <script src="../js/main.js?v=1775204587481"></script>
  <script>
    function renderBusinessDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const container = document.getElementById('appContainer');
      const listings = window.LISTINGS || [];
      const item = listings.find(x => x._id === id || x.id == id);

      if (!item) {
        container.innerHTML = '<div style="padding: 100px; text-align: center;"><h3>দুঃখিত, বিজনেসটি খুঁজে পাওয়া যায়নি।</h3><a href="../listings/listings.html">সব লিস্টিং দেখুন</a></div>';
        return;
      }

      let badges = '';
      if(item.verified) badges += '<span class="badge-vf">✓ যাচাইকৃত</span>';
      if(item.featured) badges += '<span class="badge-ft">ফিচার্ড</span>';
      if(item.premium) badges += '<span class="badge-pr">প্রিমিয়াম</span>';

      container.innerHTML = `
        <div class="biz-header">
          <div class="container biz-header-content">
            <div class="biz-icon-large">
              ${item.image ? `<img src="${item.image}" alt="Logo">` : `<span>${item.icon || '🏢'}</span>`}
            </div>
            <div class="biz-title-wrap">
              <h1>${item.name} ${badges}</h1>
              <div class="biz-info-pills">
                <span>📍 ${item.area || ''}, ${item.district || ''}</span>
                <span>☎ ${item.phone || 'তথ্য নেই'}</span>
                <span>⭐ <b>${item.rating || 0}</b> (${item.reviews || 0} রিভিউ)</span>
              </div>
            </div>
          </div>
        </div>

        <main class="container">
          <div class="content-grid">
            <div class="main-panel">
              <h3 style="color: var(--green); margin-bottom: 15px;">🔍 বর্ণনা</h3>
              <div class="desc-box">${item.description || item.desc || 'কোনো বর্ণনা দেওয়া হয়নি।'}</div>
              
              <h3 style="color: var(--green); margin-bottom: 15px;">🖼 গ্যালারি</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                ${item.image ? `<img src="${item.image}" style="width:100%; border-radius:12px;">` : '<div style="background:#f9f9f9; height:150px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#ccc;">ছবি নেই</div>'}
              </div>
            </div>

            <div class="side-panel">
              <div class="info-sm-card">
                <h5>📞 সরাসরি যোগাযোগ</h5>
                <a href="tel:${item.phone}" class="btn-sticky-phone">কল করুন</a>
              </div>
              <div class="info-sm-card">
                <h5>🕒 স্ট্যাটাস</h5>
                <div style="font-weight: 600; color: var(--green);">সক্রিয়</div>
              </div>
              <div class="info-sm-card">
                <h5>🏙 এলাকা ও বিভাগ</h5>
                <div style="font-weight: 600;">${item.area || 'N/A'}, ${item.district || ''}, ${item.division || ''}</div>
              </div>
              
              <div style="background:var(--bg); border:1px solid var(--border); border-radius:24px; padding:25px; text-align:center; margin-top:20px;">
                <h4 style="margin:0;">ম্যাপ ফিচার শীঘ্রই আসছে</h4>
              </div>
            </div>
          </div>
        </main>
      `;
    }

    document.addEventListener("DOMContentLoaded", () => {
      if (window.LISTINGS && window.LISTINGS.length > 0) {
        renderBusinessDetail();
      } else {
        window.addEventListener('dataReady', renderBusinessDetail);
      }
    });
  </script>
</body>
</html>
