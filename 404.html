<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>৪০৪ - পেজ পাওয়া যায়নি | BusinessBangla</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .error-card {
      max-width: 500px;
      background: #fff;
      padding: 60px 40px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .error-code {
      font-size: 100px;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
      margin-bottom: 20px;
      font-family: 'Poppins', sans-serif;
    }
    .error-card h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: var(--dark);
    }
    .error-card p {
      color: var(--mid);
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn-home {
      background: var(--yp);
      color: var(--dark);
      padding: 14px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      display: inline-block;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(239, 184, 16, 0.2);
    }
    .btn-home:hover {
      background: var(--yp2);
      color: #fff;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">৪০৪</div>
    <h1>দুঃখিত, পেজটি পাওয়া যায়নি!</h1>
    <p>আপনি যে লিংকটি খুঁজছেন তা হয়তো মুছে ফেলা হয়েছে অথবা লিংকটি ভুল। পুনরায় চেষ্টা করুন অথবা হোম পেজে ফিরে যান।</p>
    <a href="/" class="btn-home">হোম পেজে ফিরে যান</a>
  </div>
</body>
</html>
